apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: btc-trading-frontend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "5"
        autoscaling.knative.dev/minScale: "0"
    spec:
      containers:
        - image: gcr.io/PROJECT_ID/btc-trading-frontend
          ports:
            - containerPort: 80

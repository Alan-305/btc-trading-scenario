services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      LOG_LEVEL: INFO
    depends_on:
      - redis
    volumes:
      - ./backend:/app
